server {
    listen 80;
    server_name _;

    # ── Static React app ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — non-API routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend reverse proxy ────────────────────────────────────────────────
    # The backend container is reachable on the docker network as "backend:8000"
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sync calls to ZKTeco devices can be slow — generous timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;

        client_max_body_size 50M;
    }

    # Swagger / ReDoc / health passthroughs
    location ~ ^/(docs|redoc|openapi\.json|health)$ {
        proxy_pass http://backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    server_tokens off;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
